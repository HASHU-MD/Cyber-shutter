<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HASHU-MD | CYBER APP STORE</title>
    <style>
        :root {
            --primary: #0f0;
            --bg: #050505;
            --card-bg: #111;
        }

        body {
            background: var(--bg);
            color: #eee;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Header Area */
        header {
            background: #000;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 3px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            margin: 0;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--primary);
            font-size: 28px;
        }

        /* Search Bar */
        .search-box {
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #searchBar {
            width: 90%;
            max-width: 600px;
            padding: 15px;
            border-radius: 30px;
            border: 1px solid var(--primary);
            background: #1a1a1a;
            color: #fff;
            font-size: 16px;
            outline: none;
            box-shadow: inset 0 0 5px var(--primary);
        }

        /* App Grid Area */
        .container {
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
        }

        /* App Card UI */
        .app-card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .app-card:hover {
            border-color: var(--primary);
            transform: translateY(-8px);
            box-shadow: 0 5px 15px rgba(0, 255, 0, 0.2);
        }

        .app-icon {
            width: 70px;
            height: 70px;
            background: #222;
            border-radius: 15px;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            border: 1px solid #333;
        }

        .app-name {
            display: block;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .app-category {
            display: block;
            font-size: 10px;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .download-btn {
            display: block;
            background: var(--primary);
            color: #000;
            padding: 8px 0;
            border-radius: 10px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 800;
            transition: 0.2s;
        }

        .download-btn:active {
            transform: scale(0.95);
            background: #0a0;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #444;
            font-size: 13px;
        }

        /* Responsive Fix for Phones */
        @media (max-width: 480px) {
            .app-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<header>
    <h1>HASHU-MD STORE</h1>
</header>

<div class="search-box">
    <input type="text" id="searchBar" placeholder="Search 30+ Apps..." onkeyup="searchApp()">
</div>

<div class="container">
    <div class="app-grid" id="appGrid">
        </div>
</div>

<footer>
    &copy; 2026 DARK CYBER LEADERZ | DEVELOPED BY HASHU
</footer>

    // App Data Array (30 Apps)

        { name: "Vercel Deployer", cat: "Dev", icon: "🚀" },
        { name: "PUBG GFX Tool", cat: "Game", icon: "🛠️" },
        { name: "VPN Cyber", cat: "Security", icon: "🛡️" },
        { name: "Auto Typer", cat: "Utility", icon: "⌨️" },
        { name: "ID Checker FF", cat: "Tool", icon: "🔍" },
        { name: "Dark Web Browser", cat: "Web", icon: "🌐" },

    ];

    const appGrid = document.getElementById('appGrid');

    // Function to display apps
    function displayApps(appArray) {
        appGrid.innerHTML = "";
        appArray.forEach(app => {
            appGrid.innerHTML += `
                <div class="app-card">
                    <div class="app-icon">${app.icon}</div>
                    <span class="app-name">${app.name}</span>
                    <span class="app-category">${app.cat}</span>
                    <a href="#" class="download-btn">GET APP</a>
                </div>
            `;
        });
    }

    // Initial Display
    displayApps(apps);

    // Search Logic
    function searchApp() {
        let term = document.getElementById('searchBar').value.toLowerCase();
        let filtered = apps.filter(a => a.name.toLowerCase().includes(term));
        displayApps(filtered);
    }
</script>

</body>
</html>
