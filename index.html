<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HASHU CYBER SHOOTER</title>
    <style>
        body { margin: 0; background: #000; font-family: 'Courier New', Courier, monospace; overflow: hidden; touch-action: manipulation; }
        #game-container { position: relative; width: 100vw; height: 70vh; background: #111; border-bottom: 3px solid #0f0; overflow: hidden; }
        #player { position: absolute; width: 40px; height: 40px; background: #0f0; border-radius: 5px; box-shadow: 0 0 15px #0f0; transition: top 0.1s; }
        .bullet { position: absolute; width: 15px; height: 4px; background: #ff0; box-shadow: 0 0 10px #ff0; }
        .enemy { position: absolute; width: 35px; height: 35px; background: #f00; border-radius: 50%; box-shadow: 0 0 15px #f00; }
        #controls { height: 30vh; display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 10px; gap: 10px; background: #222; }
        .btn { background: #333; color: #0f0; border: 2px solid #0f0; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; user-select: none; }
        .btn:active { background: #0f0; color: #000; }
        #score-board { position: absolute; top: 10px; left: 10px; color: #0f0; font-size: 18px; z-index: 10; }
    </style>
</head>
<body>

<div id="score-board">SCORE: <span id="score">0</span></div>
<div id="game-container">
    <div id="player" style="top: 50%; left: 20px;"></div>
</div>

<div id="controls">
    <div class="btn" id="upBtn">UP</div>
    <div class="btn" id="shootBtn" style="background: #500; border-color: #f00; color: #fff;">FIRE 🔫</div>
    <div class="btn" id="downBtn">DOWN</div>
</div>

<script src="game.js"></script>
</body>
</html>
